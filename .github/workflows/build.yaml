name: Build

on: workflow_dispatch

permissions:
  contents: write

jobs:
  linux-build:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up libraries
        run: |
          python -m pip install wheel pyinstaller
          python -m pip install .

      - name: Build
        run: pyinstaller --icon logo/logo.ico -F nyaaup/__init__.py -n nyaaup --collect-all tls_client --collect-all mal --collect-all pymediainfo --collect-all cloup --collect-all click --collect-all rich --collect-all niquests --collect-all ruamel.yaml --collect-all langcodes --collect-all language-data

      - name: Fetch changelog and version
        id: get-info
        run: |
          VERSION_LINE=$(grep -m1 -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md)
          PACKAGE_VERSION=$(echo "$VERSION_LINE" | sed -E 's/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/')

          # Extract the changelog section corresponding to the version
          CHANGELOG_ENTRY=$(awk "/^## \\[$PACKAGE_VERSION\\]/ {found=1; next} /^## \\[/ {if (found) exit} found" CHANGELOG.md)

          echo "$CHANGELOG_ENTRY" > changelog.txt
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Rename binary
        run: mv dist/nyaaup nyaaup-v${{ steps.get-info.outputs.version }}-linux-x64

      - name: Upload release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.get-info.outputs.version }}
          FILENAME: nyaaup-v${{ steps.get-info.outputs.version }}-linux-x64
        run: |
          if gh release view "$RELEASE_TAG" --repo ${{ github.repository }}; then
            gh release upload "$RELEASE_TAG" "$FILENAME" --repo ${{ github.repository }} --clobber
          else
            gh release create "$RELEASE_TAG" \
              --repo ${{ github.repository }} \
              --title "Release $RELEASE_TAG" \
              --notes-file changelog.txt \
              "$FILENAME"
          fi

  windows-build:
    name: Windows
    runs-on: windows-latest
    needs: linux-build

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up libraries
        run: |
          python -m pip install pyinstaller
          python -m pip install .

      - name: Fetch version
        run: |
          $version=python -c "import re; print(re.search(r'## \[([0-9.]+)', open('CHANGELOG.md').read()).group(1))"
          echo "Version: $version"
          echo "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build
        run: |
          pyinstaller --icon logo/logo.ico -F nyaaup/__init__.py -n nyaaup --collect-all tls_client --collect-all mal --collect-all pymediainfo --collect-all cloup --collect-all click --collect-all rich --collect-all niquests --collect-all ruamel.yaml --collect-all langcodes --collect-all language-data

      - name: Rename binary
        run: mv dist/nyaaup.exe nyaaup-v${{ env.RELEASE_VERSION }}-windows-x64.exe

      - name: Upload release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_VERSION }}
          FILENAME: nyaaup-v${{ env.RELEASE_VERSION }}-windows-x64.exe
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo ${{ github.repository }}; then
            gh release upload "$RELEASE_TAG" "$FILENAME" --repo ${{ github.repository }} --clobber
          else
            gh release create "$RELEASE_TAG" \
              --repo ${{ github.repository }} \
              --title "Release $RELEASE_TAG" \
              --notes "" \
              "$FILENAME"
          fi

      - name: Workflow finished
        run: echo "Workflow finished."
